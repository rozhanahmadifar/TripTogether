[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Rewrite the un-prefixed /netlify/functions path used by the app to
# Netlify's actual function endpoint, so it resolves in both `netlify dev`
# and production without changing the visible URL.
[[redirects]]
  from = "/netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — must come after the functions rule above so it doesn't
# swallow function requests.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
